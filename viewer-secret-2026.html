<!DOCTYPE html>
<html lang="ja" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📊 トレンドレポート・ライブラリ</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body { font-family: 'Noto Sans JP', system-ui, sans-serif; background: #030712; color: #e5e7eb; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #374151; border-radius: 9999px; }

    /* ── Mark highlight ── */
    mark {
      background: rgba(251, 191, 36, 0.18);
      color: #fcd34d;
      padding: 1px 4px;
      border-radius: 3px;
      border-bottom: 1px solid rgba(251, 191, 36, 0.4);
    }

    /* ── Mermaid ── */
    .mermaid { margin: 1.5rem 0; text-align: center; background: #0d1117;
               border: 1px solid #1f2937; border-radius: 10px; padding: 1.25rem;
               overflow-x: auto; }
    .mermaid svg { max-width: 100%; height: auto; border-radius: 6px; font-size: 13px; }

    /* ── Table wrap ── */
    .table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid #374151; margin: 1rem 0; }
    .table-wrap .prose table, .prose .table-wrap table { margin: 0; border: none; }
    .prose .table-wrap th, .prose .table-wrap td { white-space: nowrap; }
    .prose table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .prose th { background: #1a2332; color: #93c5fd; padding: 0.65rem 0.9rem; text-align: left; border: 1px solid #374151; font-weight: 600; font-size: 0.82rem; letter-spacing: 0.03em; }
    .prose td { padding: 0.5rem 0.9rem; border: 1px solid #1f2937; color: #d1d5db; }

    /* ── Accordion ── */
    .acc-body { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
    .acc-body.open { max-height: 99999px; }

    /* ── Report item active ── */
    .report-item.active { background: rgba(37, 99, 235, 0.12); border-left-color: #3b82f6; }

    /* ── Filter tab active ── */
    .ftab.active { background: #2563eb; color: #fff; }
    .ftab:not(.active) { background: #1f2937; color: #6b7280; }
    .ftab:not(.active):hover { color: #d1d5db; }

    /* ── Prose (markdown) ── */
    .prose h1 { font-family: 'Noto Serif JP', serif; font-size: 1.55rem; font-weight: 700; color: #f9fafb; margin: 1.6rem 0 0.9rem; line-height: 1.35; }
    .prose h2 { font-size: 1.15rem; font-weight: 700; color: #60a5fa; margin: 1.75rem 0 0.65rem; padding-bottom: 0.4rem; border-bottom: 1px solid #1e3a5f; }
    .prose h3 { font-size: 1rem; font-weight: 600; color: #c7d2fe; margin: 1.25rem 0 0.45rem; }
    .prose h4 { font-size: 0.9rem; font-weight: 600; color: #9ca3af; margin: 1rem 0 0.35rem; }
    .prose p  { color: #d1d5db; line-height: 1.85; margin: 0.55rem 0; }
    .prose ul { list-style: none; padding-left: 0; color: #d1d5db; margin: 0.55rem 0; }
    .prose ul li { padding-left: 1.3rem; position: relative; margin: 0.3rem 0; line-height: 1.75; }
    .prose ul li::before { content: "▸"; position: absolute; left: 0; color: #3b82f6; font-size: 0.75rem; top: 0.2rem; }
    .prose ol { list-style: decimal; padding-left: 1.5rem; color: #d1d5db; margin: 0.55rem 0; }
    .prose ol li { margin: 0.3rem 0; line-height: 1.75; }
    .prose strong { color: #f9fafb; font-weight: 600; }
    .prose em { color: #9ca3af; }
    .prose a { color: #60a5fa; text-decoration: underline; }
    .prose a:hover { color: #93c5fd; }
    .prose blockquote { border-left: 3px solid #3b82f6; padding: 0.4rem 1rem; margin: 0.8rem 0; color: #9ca3af; background: rgba(59, 130, 246, 0.05); border-radius: 0 6px 6px 0; }
    .prose code { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 0.82em; background: #111827; color: #34d399; padding: 0.15em 0.4em; border-radius: 4px; }
    .prose pre { background: #0d1117; border: 1px solid #1f2937; border-radius: 10px; padding: 1rem 1.2rem; overflow-x: auto; margin: 1rem 0; }
    .prose pre code { background: none; color: #c9d1d9; padding: 0; font-size: 0.83rem; }
    .prose tr:nth-child(even) td { background: rgba(17, 24, 39, 0.6); }
    .prose hr { border: none; border-top: 1px solid #1f2937; margin: 1.5rem 0; }

    /* ── Loading spinner ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { display: inline-block; animation: spin 0.9s linear infinite; }

    /* ── Fade-in ── */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .fadein { animation: fadeIn 0.3s ease; }

    /* ── URL links ── */
    .url-link { color: #60a5fa; text-decoration: underline; word-break: break-all; }
    .url-link:hover { color: #93c5fd; }
  </style>
</head>
<body class="h-screen overflow-hidden">

  <!-- ═══ Auth Gate ═══════════════════════════════════════════ -->
  <div id="gate" class="fixed inset-0 z-50 flex items-center justify-center" style="background:#030712">
    <div class="text-center">
      <div class="text-5xl mb-3 spin">⟳</div>
      <p class="text-gray-600 text-sm">認証中…</p>
    </div>
  </div>

  <!-- ═══ App ══════════════════════════════════════════════════ -->
  <div id="app" class="hidden h-screen flex flex-col">

    <!-- Header -->
    <header class="flex-shrink-0 h-14 bg-gray-900 border-b border-gray-800 flex items-center justify-between px-4 z-30">
      <div class="flex items-center gap-3">
        <button id="hamburger" class="lg:hidden p-1.5 rounded-lg text-gray-500 hover:text-white hover:bg-gray-800 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
        <span class="text-xl select-none">📊</span>
        <h1 class="font-bold text-white text-sm sm:text-base tracking-tight whitespace-nowrap">トレンドレポート・ライブラリ</h1>
      </div>
      <div class="flex items-center gap-2">
        <span id="hd-count" class="text-xs text-gray-600 hidden sm:block"></span>
      </div>
    </header>

    <div class="flex flex-1 overflow-hidden relative">

      <!-- Sidebar Overlay (mobile) -->
      <div id="overlay" class="hidden fixed inset-0 top-14 bg-black/70 z-20 lg:hidden" onclick="closeSidebar()"></div>

      <!-- ── Sidebar ── -->
      <aside id="sidebar"
        class="w-72 flex-shrink-0 bg-gray-900 border-r border-gray-800 flex flex-col z-30
               fixed top-14 bottom-0 left-0 -translate-x-full transition-transform duration-300
               lg:relative lg:top-0 lg:translate-x-0">

        <!-- Filter tabs -->
        <div class="p-2.5 border-b border-gray-800 flex gap-1.5">
          <button class="ftab active flex-1 py-1.5 text-xs font-semibold rounded-lg transition-colors" data-f="all"    onclick="setFilter(this,'all')">すべて</button>
          <button class="ftab        flex-1 py-1.5 text-xs font-semibold rounded-lg transition-colors" data-f="daily"  onclick="setFilter(this,'daily')">日報</button>
          <button class="ftab        flex-1 py-1.5 text-xs font-semibold rounded-lg transition-colors" data-f="weekly" onclick="setFilter(this,'weekly')">週報</button>
        </div>

        <!-- List -->
        <div id="report-list" class="flex-1 overflow-y-auto p-2 space-y-0.5">
          <p class="text-center text-gray-700 text-xs py-10">読み込み中…</p>
        </div>

        <!-- Footer -->
        <div class="p-3 border-t border-gray-800">
          <p class="text-center text-gray-700 text-xs">🔒 Secured Access</p>
        </div>
      </aside>

      <!-- ── Main ── -->
      <main id="main" class="flex-1 overflow-y-auto bg-gray-950">

        <!-- State: empty -->
        <div id="st-empty" class="h-full flex items-center justify-center px-6">
          <div class="text-center max-w-xs">
            <div class="text-6xl mb-5 opacity-30">📭</div>
            <h2 class="text-lg font-bold text-white mb-2">レポートがありません</h2>
            <p class="text-gray-600 text-sm leading-relaxed">
              <code class="bg-gray-900 text-green-500 px-1.5 py-0.5 rounded text-xs">reports/index.json</code>
              にレポートが登録されると、ここに表示されます。
            </p>
          </div>
        </div>

        <!-- State: loading -->
        <div id="st-loading" class="hidden h-full flex items-center justify-center">
          <div class="text-center">
            <div class="text-4xl spin mb-3 block">⟳</div>
            <p class="text-gray-600 text-sm">読み込み中…</p>
          </div>
        </div>

        <!-- State: content -->
        <div id="st-content" class="hidden fadein">
          <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-8 pb-16">

            <!-- Meta -->
            <div class="flex flex-wrap items-start gap-3 mb-5 pb-5 border-b border-gray-800">
              <div class="flex items-center gap-2.5">
                <span id="meta-badge"></span>
                <span id="meta-date" class="text-white font-semibold text-base"></span>
                <span id="meta-time" class="text-gray-600 text-xs"></span>
              </div>
              <div id="meta-topics" class="flex flex-wrap gap-1.5 w-full mt-1"></div>
            </div>

            <!-- Report body -->
            <article id="report-body" class="prose"></article>

            <!-- Analyst accordions -->
            <section id="analyst-section" class="hidden mt-10 pt-8 border-t border-gray-800">
              <h3 class="text-xs font-bold text-gray-600 uppercase tracking-widest mb-4 flex items-center gap-2">
                <span>🔍</span> アナリスト詳細分析
                <span id="analyst-note" class="hidden text-gray-700 font-normal normal-case tracking-normal">（最新の分析から表示）</span>
              </h3>
              <div id="analyst-list" class="space-y-3"></div>
            </section>

          </div>
        </div>

      </main>
    </div>
  </div><!-- /#app -->

  <script>
  // ═══════════════════════════════════════════════════════
  //  CONFIG
  // ═══════════════════════════════════════════════════════
  const CFG = {
    pw:    'ai-view',
    index: 'reports/index.json',
    analysts: [
      { id: 'tech',   file: 'tech_analysis.md',   label: '🔬 Tech視点 詳細分析',   color: '#38bdf8' },
      { id: 'human',  file: 'human_analysis.md',  label: '🌍 Human視点 詳細分析',  color: '#4ade80' },
      { id: 'critic', file: 'critic_analysis.md', label: '⚠️ Critic視点 詳細分析', color: '#fb7185' },
    ]
  };

  // ═══════════════════════════════════════════════════════
  //  STATE
  // ═══════════════════════════════════════════════════════
  let reports = [];
  let filter  = 'all';

  // ═══════════════════════════════════════════════════════
  //  AUTH
  // ═══════════════════════════════════════════════════════
  (function auth() {
    if (sessionStorage.getItem('trl') === '1') { boot(); return; }
    let tries = 0;
    (function ask() {
      if (tries >= 3) {
        document.getElementById('gate').innerHTML =
          '<div class="text-center"><div class="text-5xl mb-4">🔒</div>' +
          '<p class="text-red-500 font-bold">アクセス拒否</p>' +
          '<p class="text-gray-600 text-sm mt-2">ページを更新して再試行してください。</p></div>';
        return;
      }
      const v = prompt(tries === 0 ? '🔑 パスワードを入力してください' : `🔑 パスワードが違います（残り ${3-tries} 回）`);
      if (v === null) {
        document.getElementById('gate').innerHTML =
          '<div class="text-center"><div class="text-5xl mb-4">🔒</div>' +
          '<p class="text-gray-500 text-sm">キャンセルされました。ページを更新してください。</p></div>';
        return;
      }
      if (v === CFG.pw) { sessionStorage.setItem('trl','1'); boot(); }
      else { tries++; ask(); }
    })();
  })();

  // ═══════════════════════════════════════════════════════
  //  BOOT
  // ═══════════════════════════════════════════════════════
  async function boot() {
    document.getElementById('gate').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');

    // marked: custom mermaid renderer
    marked.use({
      renderer: {
        code(code, lang) {
          if (lang === 'mermaid') return '<div class="mermaid">' + code + '</div>';
          const safe = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
          return '<pre><code' + (lang ? ' class="language-'+lang+'"' : '') + '>' + safe + '</code></pre>';
        }
      },
      gfm: true, breaks: true
    });

    // mermaid: dark theme
    mermaid.initialize({
      startOnLoad: false,
      theme: 'dark',
      themeVariables: {
        background:          '#0d1117',
        primaryColor:        '#1e3a8a',
        primaryTextColor:    '#e5e7eb',
        primaryBorderColor:  '#3b82f6',
        lineColor:           '#6b7280',
        secondaryColor:      '#1f2937',
        tertiaryColor:       '#111827',
        tertiaryTextColor:   '#d1d5db',
        edgeLabelBackground: '#111827',
        clusterBkg:          '#111827',
        clusterBorder:       '#374151',
        titleColor:          '#f9fafb',
        nodeBorder:          '#3b82f6',
        nodeTextColor:       '#f9fafb',
        fontSize:            '14px',
        fontFamily:          "'Noto Sans JP', system-ui, sans-serif",
      }
    });

    // mobile menu
    document.getElementById('hamburger').addEventListener('click', () => {
      const s = document.getElementById('sidebar');
      const o = document.getElementById('overlay');
      const open = !s.classList.contains('-translate-x-full');
      s.classList.toggle('-translate-x-full', open);
      o.classList.toggle('hidden', open);
    });

    await loadIndex();
  }

  function closeSidebar() {
    document.getElementById('sidebar').classList.add('-translate-x-full');
    document.getElementById('overlay').classList.add('hidden');
  }

  // ═══════════════════════════════════════════════════════
  //  LOAD INDEX
  // ═══════════════════════════════════════════════════════
  async function loadIndex() {
    try {
      const r = await fetch(CFG.index + '?_=' + Date.now());
      if (!r.ok) throw new Error();
      reports = await r.json();
    } catch { reports = []; }

    document.getElementById('hd-count').textContent = reports.length ? reports.length + ' レポート' : '';
    renderList();
    if (reports.length) loadReport(reports[0]);
  }

  // ═══════════════════════════════════════════════════════
  //  SIDEBAR LIST
  // ═══════════════════════════════════════════════════════
  function renderList() {
    const shown = filter === 'all' ? reports : reports.filter(r => r.type === filter);
    const el = document.getElementById('report-list');
    if (!shown.length) {
      el.innerHTML = '<p class="text-center text-gray-700 text-xs py-10">該当レポートなし</p>';
      return;
    }
    el.innerHTML = shown.map(r => {
      const i   = reports.indexOf(r);
      const day = r.type === 'daily';
      const badge = day
        ? '<span class="px-1.5 py-0.5 bg-blue-950 text-blue-400 border border-blue-900 text-xs font-bold rounded">日報</span>'
        : '<span class="px-1.5 py-0.5 bg-purple-950 text-purple-400 border border-purple-900 text-xs font-bold rounded">週報</span>';
      const topics = (r.topics||[]).slice(0,2).join(' / ') + ((r.topics||[]).length > 2 ? ' …' : '');
      return `<button class="report-item w-full text-left px-3 py-2.5 rounded-lg border-l-2 border-transparent
                             hover:bg-gray-800/50 transition-all duration-150"
                      onclick="loadReport(reports[${i}],this);closeSidebar()">
        <div class="flex items-center gap-2 mb-0.5">
          ${badge}
          <span class="text-white text-sm font-semibold">${r.date}</span>
          ${r.time ? `<span class="text-gray-700 text-xs ml-auto">${r.time.slice(0,5)}</span>` : ''}
        </div>
        ${topics ? `<p class="text-gray-600 text-xs truncate mt-0.5">${topics}</p>` : ''}
      </button>`;
    }).join('');
  }

  function setFilter(btn, type) {
    filter = type;
    document.querySelectorAll('.ftab').forEach(b => b.classList.toggle('active', b === btn));
    renderList();
  }

  // ═══════════════════════════════════════════════════════
  //  LOAD REPORT
  // ═══════════════════════════════════════════════════════
  async function loadReport(report, btn) {
    document.querySelectorAll('.report-item').forEach(el => el.classList.remove('active'));
    (btn || document.querySelector('.report-item'))?.classList.add('active');

    showState('loading');

    try {
      const res = await fetch(report.path + '?_=' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const md = await res.text();

      renderMeta(report);
      const reportBody = document.getElementById('report-body');
      reportBody.innerHTML = marked.parse(md);
      linkify(reportBody);
      wrapTables(reportBody);
      await runMermaid(reportBody);
      await loadAnalysts(report);

      showState('content');
      document.getElementById('main').scrollTop = 0;

    } catch (e) {
      document.getElementById('report-body').innerHTML =
        `<div style="text-align:center;padding:4rem 0">
          <p style="font-size:2.5rem;margin-bottom:1rem">📄</p>
          <p style="color:#6b7280">レポートを読み込めませんでした</p>
          <p style="color:#374151;font-size:.75rem;margin-top:.5rem">${e.message}</p>
        </div>`;
      showState('content');
    }
  }

  // ── Meta bar ────────────────────────────────────────────
  function renderMeta(r) {
    const day = r.type === 'daily';

    document.getElementById('meta-badge').outerHTML =
      `<span id="meta-badge" class="px-2.5 py-1 text-xs font-bold rounded-full border ${
        day ? 'bg-blue-950 text-blue-400 border-blue-900'
            : 'bg-purple-950 text-purple-400 border-purple-900'}">${day ? '日報' : '週報'}</span>`;

    document.getElementById('meta-date').textContent = r.date;
    document.getElementById('meta-time').textContent = r.time || '';

    document.getElementById('meta-topics').innerHTML =
      (r.topics||[]).map(t =>
        `<span class="px-2.5 py-0.5 bg-gray-800/80 text-gray-400 text-xs rounded-full border border-gray-700/60">${t}</span>`
      ).join('');
  }

  // ═══════════════════════════════════════════════════════
  //  ANALYST ACCORDIONS
  // ═══════════════════════════════════════════════════════
  async function loadAnalysts(report) {
    const dir     = report.path.replace(/\/[^/]+$/, '');
    const section = document.getElementById('analyst-section');
    const list    = document.getElementById('analyst-list');
    const note    = document.getElementById('analyst-note');

    list.innerHTML = '';
    let anyFound = false;
    let usingFallback = false;

    for (const a of CFG.analysts) {
      let md = null, fromFallback = false;

      // 1st: report-local copy  2nd: workspace/outputs/ (latest run fallback)
      for (const [path, isFallback] of [
        [`${dir}/${a.file}`, false],
        [`workspace/outputs/${a.file}`, true]
      ]) {
        try {
          const r = await fetch(path + '?_=' + Date.now());
          if (r.ok) { md = await r.text(); fromFallback = isFallback; break; }
        } catch {}
      }

      if (!md) continue;
      anyFound = true;
      if (fromFallback) usingFallback = true;

      const id = 'acc-' + a.id;
      list.insertAdjacentHTML('beforeend', `
        <div class="rounded-xl border border-gray-800 overflow-hidden"
             style="background:#0d1117">
          <button class="w-full flex items-center justify-between px-5 py-4
                         hover:bg-gray-800/30 transition-colors text-left"
                  onclick="toggleAcc('${id}')">
            <span class="font-semibold text-sm" style="color:${a.color}">${a.label}</span>
            <svg id="${id}-icon" class="w-4 h-4 text-gray-600 transition-transform duration-200 flex-shrink-0"
                 fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
            </svg>
          </button>
          <div id="${id}" class="acc-body border-t border-gray-800">
            <div id="${id}-body" class="prose px-5 py-5 text-sm"></div>
          </div>
        </div>`);

      const bodyEl = document.getElementById(id + '-body');
      bodyEl.innerHTML = marked.parse(md);
      linkify(bodyEl);
      wrapTables(bodyEl);
    }

    note.classList.toggle('hidden', !usingFallback);
    section.classList.toggle('hidden', !anyFound);
    if (anyFound) await runMermaid(section);
  }

  function toggleAcc(id) {
    const body = document.getElementById(id);
    const icon = document.getElementById(id + '-icon');
    const open = body.classList.toggle('open');
    icon.style.transform = open ? 'rotate(180deg)' : '';
    if (open) setTimeout(() => runMermaid(body), 60);
  }

  // ═══════════════════════════════════════════════════════
  //  MERMAID
  // ═══════════════════════════════════════════════════════
  async function runMermaid(container) {
    const nodes = [...container.querySelectorAll('.mermaid:not([data-processed])')];
    if (!nodes.length) return;
    try { await mermaid.run({ nodes }); } catch(e) { console.warn('mermaid:', e); }
  }

  // ═══════════════════════════════════════════════════════
  //  LINKIFY  (bare URLs → clickable <a>)
  // ═══════════════════════════════════════════════════════
  function linkify(container) {
    const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, {
      acceptNode(node) {
        let p = node.parentElement;
        while (p && p !== container) {
          if (['A','CODE','PRE'].includes(p.tagName)) return NodeFilter.FILTER_REJECT;
          if (p.classList && p.classList.contains('mermaid')) return NodeFilter.FILTER_REJECT;
          p = p.parentElement;
        }
        return /https?:\/\//.test(node.textContent)
          ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_REJECT;
      }
    });
    const nodes = [];
    let n; while ((n = walker.nextNode())) nodes.push(n);
    nodes.forEach(tn => {
      const frag = document.createDocumentFragment();
      tn.textContent.split(/(https?:\/\/[^\s<>"'（）「」、。\]]+)/g).forEach((part, i) => {
        if (i % 2 === 1) {
          const a = document.createElement('a');
          a.href = part; a.textContent = part;
          a.target = '_blank'; a.rel = 'noopener noreferrer'; a.className = 'url-link';
          frag.appendChild(a);
        } else { frag.appendChild(document.createTextNode(part)); }
      });
      tn.parentNode.replaceChild(frag, tn);
    });
  }

  // ═══════════════════════════════════════════════════════
  //  WRAP TABLES  (add overflow scroll wrapper)
  // ═══════════════════════════════════════════════════════
  function wrapTables(container) {
    container.querySelectorAll('table').forEach(tbl => {
      if (tbl.parentElement.classList.contains('table-wrap')) return;
      const wrap = document.createElement('div');
      wrap.className = 'table-wrap';
      tbl.parentNode.insertBefore(wrap, tbl);
      wrap.appendChild(tbl);
    });
  }

  // ═══════════════════════════════════════════════════════
  //  STATE SWITCHER
  // ═══════════════════════════════════════════════════════
  function showState(s) {
    ['empty','loading','content'].forEach(k =>
      document.getElementById('st-'+k).classList.toggle('hidden', k !== s)
    );
    // re-apply fade on content switch
    if (s === 'content') {
      const el = document.getElementById('st-content');
      el.classList.remove('fadein');
      void el.offsetWidth;
      el.classList.add('fadein');
    }
  }
  </script>
</body>
